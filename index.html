<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beyond The Screen</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">

  <style>
   * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, sans-serif;
}

body {
  background: radial-gradient(circle at top, #1a1a2e, #0b0b0f);
  color: white;
  overflow-x: hidden;
}

/* HERO */
.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  font-size: 4rem;
  font-weight: 900;
}

p {
  opacity: 0.7;
  margin-top: 10px;
}

.btn {
  margin-top: 25px;
  padding: 12px 28px;
  background: white;
  color: black;
  border-radius: 30px;
  text-decoration: none;
  font-weight: 600;
}

/* SECTIONS */
section {
  padding: 120px 20px;
  text-align: center;
}

section h2 {
  font-size: 2.5rem;
  margin-bottom: 20px;
}

/* GALLERY */
#gallery img {
  margin: 10px;
  border-radius: 12px;
  transition: 0.3s;
}

#gallery img:hover {
  transform: scale(1.05);
}

/* SECTION BACKGROUNDS */
#about, #reviews, #gallery {
  background: rgba(255,255,255,0.03);
  margin-top: 60px;
}

/* GLOW */
.glow {
  position: absolute;
  width: 400px;
  height: 400px;
  background: #6c63ff;
  filter: blur(120px);
  opacity: 0.3;
  top: 20%;
  left: 30%;
}
  </style>
</head>

<body>
  <div class="glow"></div>

 <div class="container">
  <h1>Beyond The Screen</h1>
  <p>A minimal, experimental, research-driven web experience.</p>
  <a href="#about" class="btn">Enter Experience</a>
</div>

<section id="about">
  <h2>About the Author</h2>
  <p>This is a creative web experiment made for learning design and aesthetics.</p>
</section>

<section id="reviews">
  <h2>Reviews</h2>
  <p>“Looks futuristic.”</p>
  <p>“Very clean design.”</p>
</section>

<section id="gallery">
  <h2>Gallery</h2>

  <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d" width="200">
  <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085" width="200">
  <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" width="200">
</section>

</body>
</html>
