<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beyond The Screen</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #1a1a2e, #0b0b0f);
      color: white;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .container {
      max-width: 800px;
      padding: 20px;
    }

    h1 {
      font-size: 4rem;
      font-weight: 900;
      letter-spacing: 2px;
      animation: fadeIn 1.5s ease;
    }

    p {
      margin-top: 15px;
      font-size: 1.2rem;
      opacity: 0.7;
      animation: fadeIn 2s ease;
    }

    .btn {
      margin-top: 30px;
      display: inline-block;
      padding: 12px 28px;
      border-radius: 30px;
      background: white;
      color: black;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      background: #eaeaea;
    }

    .glow {
      position: absolute;
      width: 400px;
      height: 400px;
      background: #6c63ff;
      filter: blur(120px);
      opacity: 0.3;
      top: 20%;
      left: 30%;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="glow"></div>

 <div class="container">
  <h1>Beyond The Screen</h1>
  <p>A minimal, experimental, research-driven web experience.</p>
  <a href="#about" class="btn">Enter Experience</a>
</div>

<section id="about">
  <h2>About the Author</h2>
  <p>This is a creative web experiment made for learning design and aesthetics.</p>
</section>

<section id="reviews">
  <h2>Reviews</h2>
  <p>“Looks futuristic.”</p>
  <p>“Very clean design.”</p>
</section>

<section id="gallery">
  <h2>Gallery</h2>

  <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d" width="200">
  <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085" width="200">
  <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" width="200">
</section>

</body>
</html>
