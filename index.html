<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beyond The Screen</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">

  <style>
  html {
  scroll-behavior: smooth;
}

.container {
  position: relative;
}

.glow {
  position: fixed;
  width: 500px;
  height: 500px;
  background: #7c3aed;
  filter: blur(160px);
  opacity: 0.25;
  top: 10%;
  left: 20%;
  pointer-events: none;
  z-index: -1;
}

/* HERO text tuning */
.container h1 {
  letter-spacing: 2px;
}

/* sections spacing + readability */
section {
  max-width: 1000px;
  margin: auto;
}

section p {
  opacity: 0.75;
  line-height: 1.6;
}

/* gallery layout */
#gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
}

#gallery img {
  width: 220px;
  height: 160px;
  object-fit: cover;
}
  </style>
</head>

<body>
  <div class="glow"></div>

 <div class="container">
  <h1>Beyond The Screen</h1>
  <p>A minimal, experimental, research-driven web experience.</p>
  <a href="#about" class="btn">Enter Experience</a>
</div>

<section id="about">
  <h2>About the Author</h2>
  <p>This is a creative web experiment made for learning design and aesthetics.</p>
</section>

<section id="reviews">
  <h2>Reviews</h2>
  <p>“Looks futuristic.”</p>
  <p>“Very clean design.”</p>
</section>

<section id="gallery">
  <h2>Gallery</h2>

  <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d" width="200">
  <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085" width="200">
  <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" width="200">
</section>

</body>
</html>
